{% extends 'base.html' %}

{% block content %}

<section class="page-section">

<div class="container">

<div class="page-card mx-auto" style="max-width:500px;">


<h2>login</h2>

<form method="POST">
    {% csrf_token %}

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <button type="submit">
        login
    </button>

</form>
</div>

</div>

</section>

{% endblock %}
